# Main Configuration for OCR Vehicle Plate Detector

# Project paths
paths:
  project_root: "./"
  data_dir: "data/"
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  train_data: "data/train/"
  test_data: "data/test/"
  validation_data: "data/validation/"
  models_dir: "models/"
  models_checkpoints: "models/checkpoints/"
  plate_detection: "models/plate_detection/"
  output_dir: "output/"
  output_images: "output/images/"
  output_reports: "output/reports/"
  logs_dir: "logs/"
  src_dir: "src/"
  scripts_dir: "scripts/"
  notebooks_dir: "notebooks/"
  tests_dir: "tests/"
  docs_dir: "docs/"

# Model configuration
model:
  # Detection model settings
  detection:
    name: "yolov8"  # Options: yolov8, yolov5, faster_rcnn, ssd
    weights: "src/detection/detection.py"
    confidence_threshold: 0.5
    iou_threshold: 0.45
    img_size: [640, 640]
    device: "cuda"  # Options: cuda, cpu
  
  # OCR model settings
  ocr:
    name: "easyocr"  # Options: tesseract, easyocr, crnn
    languages: ['en']
    gpu: true
    confidence_threshold: 0.6

# Data preprocessing
preprocessing:
  resize: [640, 640]
  normalize: true
  augmentation:
    enabled: true
    rotation_range: 10
    brightness_range: [0.8, 1.2]
    horizontal_flip: true
  # VOC to YOLO conversion settings
  voc_to_yolo:
    enabled: true
    class_name: "license-plate"
    class_id: 0

# Training configuration
training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0005
  early_stopping:
    enabled: true
    patience: 10
  checkpoint:
    save_frequency: 5
    save_best_only: true
    checkpoint_dir: "models/checkpoints/"

# Inference configuration
inference:
  batch_size: 8
  save_visualizations: true
  output_format: "json"  # Options: json, csv, txt
  visualize_output_dir: "output/images/"
  results_output_dir: "output/reports/"

# Logging
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  save_logs: true
  log_file: "logs/app.log"
  log_dir: "logs/"

# Dataset configuration
dataset:
  image_extensions: [".jpg", ".jpeg", ".png"]
  annotation_format: "yolo"  # VOC annotations converted to YOLO format
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15